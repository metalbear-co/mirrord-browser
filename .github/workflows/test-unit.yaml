name: Unit Tests

on:
    workflow_call:

permissions:
    contents: read

jobs:
    test-unit:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Tests
              run: pnpm test
