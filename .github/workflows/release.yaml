name: Publish

permissions: {}

on:
    pull_request:
        branches: [main]
        types: [closed]
    workflow_dispatch:

jobs:
    validate_release_request:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            should_release: ${{ steps.validate.outputs.should_release }}
            version: ${{ steps.validate.outputs.version }}
        steps:
            - name: Checkout
              if: github.event_name == 'pull_request'
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Validate and output version
              id: validate
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [[ "${{ github.event.pull_request.merged }}" != "true" ]]; then
                    echo "PR was not merged, skipping release"
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [[ "${{ github.head_ref }}" != releases/* ]]; then
                    echo "Branch '${{ github.head_ref }}' does not start with releases/, skipping"
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  version=$(node -p "require('./package.json').version")
                  manifest_version=$(node -p "require('./src/manifest.json').version")

                  if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Version '$version' does not match semver, aborting" >&2
                    exit 1
                  fi

                  if [[ "$manifest_version" != "$version" ]]; then
                    echo "manifest.json version ($manifest_version) does not match package.json version ($version)" >&2
                    exit 1
                  fi

                  if gh release view "$version" &>/dev/null; then
                    echo "Release $version already exists, skipping"
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "should_release=true" >> "$GITHUB_OUTPUT"
                  echo "version=$version" >> "$GITHUB_OUTPUT"

    build-and-publish:
        needs: [validate_release_request]
        if: needs.validate_release_request.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install pnpm
              run: corepack enable pnpm

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test

            - name: Build extension
              run: pnpm build

            - name: Zip extension
              run: cd dist && zip -r ../extension.zip .

            - name: Upload extension artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: extension
                  path: extension.zip
                  if-no-files-found: error
                  retention-days: 1

            - name: Upload to Chrome Web Store
              run: |
                  ACCESS_TOKEN=$(curl -sf -X POST https://oauth2.googleapis.com/token \
                    -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
                    -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
                    -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
                    -d "grant_type=refresh_token" | jq -r '.access_token')

                  echo "Uploading extension..."
                  UPLOAD_RESPONSE=$(curl -s -X PUT \
                    "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}" \
                    -H "Authorization: Bearer $ACCESS_TOKEN" \
                    -H "x-goog-api-version: 2" \
                    -T extension.zip)
                  echo "$UPLOAD_RESPONSE"

                  UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState')
                  if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
                    echo "::error::Upload failed with status: $UPLOAD_STATUS"
                    exit 1
                  fi

                  echo "Publishing extension..."
                  PUBLISH_RESPONSE=$(curl -s -X POST \
                    "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}/publish" \
                    -H "Authorization: Bearer $ACCESS_TOKEN" \
                    -H "x-goog-api-version: 2")
                  echo "$PUBLISH_RESPONSE"

    create-release:
        needs: [validate_release_request, build-and-publish]
        if: needs.validate_release_request.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            VERSION: ${{ needs.validate_release_request.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Download extension artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: extension

            - name: Extract release notes from CHANGELOG.md
              run: |
                  awk "/^## \[${VERSION}\]/{found=1} found && /^## \[/ && !/^## \[${VERSION}\]/{exit} found{print}" \
                    CHANGELOG.md > /tmp/release-notes.md

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$VERSION" \
                    --title "$VERSION" \
                    --notes-file /tmp/release-notes.md \
                    extension.zip

    linear_release:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        needs: [validate_release_request, create-release]
        if: needs.validate_release_request.outputs.should_release == 'true'
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0 # Required for commit history

            - uses: metalbear-co/linear-release-action@76a250988b9470b152ec13d24d661140084042c1
              with:
                  access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
                  version: ${{ needs.validate_release_request.outputs.version }}
                  name: ${{ needs.validate_release_request.outputs.version }}
