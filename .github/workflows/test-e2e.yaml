name: E2E Tests

on:
    workflow_call:

permissions: {}

jobs:
    test-e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        container:
            image: mcr.microsoft.com/playwright:v1.58.1-jammy
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build extension
              run: pnpm build

            - name: Run E2E tests
              run: xvfb-run pnpm test:e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/

    test-e2e-real-server:
        name: E2E vs released mirrord
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        container:
            image: mcr.microsoft.com/playwright:v1.58.1-jammy
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build extension
              run: pnpm build

            - name: Download the latest released mirrord
              run: |
                  curl -fsSL -o /usr/local/bin/mirrord \
                      https://github.com/metalbear-co/mirrord/releases/latest/download/mirrord_linux_x86_64
                  chmod +x /usr/local/bin/mirrord
                  /usr/local/bin/mirrord --version

            - name: Run real-server E2E
              run: xvfb-run pnpm exec playwright test real-server.spec.ts
              env:
                  MIRRORD_BIN: /usr/local/bin/mirrord

            - name: Upload Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report-real-server
                  path: playwright-report/
