name: Staging Smoke

on:
    workflow_dispatch:
    schedule:
        - cron: '0 6 * * 1-5'

permissions: {}

jobs:
    smoke:
        name: Extension + monitor against playground/shop
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
        container:
            image: mcr.microsoft.com/playwright:v1.58.1-jammy
        steps:
            - name: Check playground credentials
              id: creds
              env:
                  PLAYGROUND_KUBECONFIG: ${{ secrets.PLAYGROUND_KUBECONFIG }}
              run: |
                  if [ -z "$PLAYGROUND_KUBECONFIG" ]; then
                      echo "available=false" >> "$GITHUB_OUTPUT"
                      echo "PLAYGROUND_KUBECONFIG secret not set; skipping smoke"
                  else
                      echo "available=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout code
              if: steps.creds.outputs.available == 'true'
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              if: steps.creds.outputs.available == 'true'
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '24'

            - name: Install pnpm
              if: steps.creds.outputs.available == 'true'
              run: npm install -g pnpm@10

            - name: Install dependencies
              if: steps.creds.outputs.available == 'true'
              run: pnpm install --frozen-lockfile

            - name: Build extension
              if: steps.creds.outputs.available == 'true'
              run: pnpm build

            - name: Download the latest released mirrord
              if: steps.creds.outputs.available == 'true'
              run: |
                  curl -fsSL -o /usr/local/bin/mirrord \
                      https://github.com/metalbear-co/mirrord/releases/latest/download/mirrord_linux_x86_64
                  chmod +x /usr/local/bin/mirrord
                  /usr/local/bin/mirrord --version

            - name: Write kubeconfig
              if: steps.creds.outputs.available == 'true'
              env:
                  PLAYGROUND_KUBECONFIG: ${{ secrets.PLAYGROUND_KUBECONFIG }}
              run: |
                  mkdir -p "$HOME/.kube"
                  printf '%s' "$PLAYGROUND_KUBECONFIG" > "$HOME/.kube/config"
                  chmod 600 "$HOME/.kube/config"

            - name: Run staging smoke
              if: steps.creds.outputs.available == 'true'
              run: bash e2e/staging-smoke.sh
              env:
                  MIRRORD_BIN: /usr/local/bin/mirrord
                  KUBECONFIG: /github/home/.kube/config

            - name: Upload diagnostics
              if: failure() && steps.creds.outputs.available == 'true'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: staging-smoke-diagnostics
                  path: |
                      playwright-report/
                      /tmp/smoke-session.log
