name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint-and-format:
        name: Lint and Format Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@11

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run format and lint checks
              run: pnpm run check

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        needs: lint-and-format

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@11

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Tests
              run: pnpm test

    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        needs: lint-and-format
        timeout-minutes: 20
        container:
            image: mcr.microsoft.com/playwright:v1.58.1-jammy

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@11

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build extensions (Chrome + Firefox)
              run: pnpm build

            - name: Lint Firefox build (web-ext)
              run: pnpm exec web-ext lint --source-dir packages/firefox/dist --no-config-discovery --self-hosted

            - name: Run E2E tests (Chrome)
              run: xvfb-run pnpm test:e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
